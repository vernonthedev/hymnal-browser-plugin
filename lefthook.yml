commit-msg:
  commands:
    "lint commit message":
      run: npx commitlint --edit {1}

pre-commit:
  parallel: true
  commands:
    eslint:
      glob: "*.{js,ts,tsx}"
      run: npx eslint {staged_files} --fix && git add {staged_files}
    prettier:
      glob: "*.{js,ts,tsx,json,md}"
      run: npx prettier --write {staged_files} && git add {staged_files}
